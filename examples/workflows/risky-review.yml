name: Risky AI Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "*/5 * * * *"

jobs:
  review:
    runs-on: macos-latest
    permissions: write-all
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: vendor/review-agent@v1
      - name: Review with agent
        run: npx claude-review "${{ github.event.pull_request.body }}"
